<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>testing</title>
    <style>
      .toggle-items {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
      }
      .toggle-items > a {
        display: flex;
        align-items: center;
        gap: 2px;
        height: 72px;
      }
      .toggle-items > a > img {
        width: 20px;
      }
      .toggle-items:hover .dropdown-items {
        opacity: 1;
        visibility: visible;
      }
      .dropdown-items > a {
        font-size: 14px;
        padding: 12px 20px;
      }
      .dropdown-items > a:hover {
        background-color: #f5f5f5;
      }
      .dropdown-items {
        position: absolute;
        align-self: center;
        top: 3rem;
        justify-self: center;
        display: grid;
        width: 600px;
        padding: 8px 0;
        background: #ffffff;
        border-radius: 10px;
        border: 1px solid #e1e1e1;
        box-shadow: 0 4px 4px rgb(0 0 0 / 6%);
        opacity: 0;
        visibility: visible;
        transition: 0.5s;
        text-align: center;
      }
      .dropdown-items::before {
        content: "";
        background-color: inherit;
        border-top: 1pxc solid #e1e1e1;
        border-right: 1px solid #e1e1e1;
      }
    </style>
  </head>
  <body>
    <div class="toggle-items">
      <a href="#">
        <img src="./assets_painReliever/ham-menu.svg" alt="" />
      </a>
      <div class="dropdown-items">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">More Info</a>
        <a href="#">Contact Us</a>
      </div>
    </div>
  </body>
</html>
